name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}  # Deny all at workflow level; grant per-job below

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit-lint-type:
    name: Unit/Lint/Type Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Upgrade base build tools (pip + setuptools) via the shared script the
          # Makefile `setup` target also calls, so CI and local can't drift. The
          # audit step below scans the whole env; see the script header for why
          # setuptools is upgraded (PYSEC-2026-3447).
          ./scripts/upgrade-base-build-tools.sh
          pip install -e ".[dev,all]"

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files

      - name: Type check with mypy
        run: |
          mypy kibana/

      - name: Security audit dependencies
        run: |
          pip-audit

      - name: SAST scan
        run: |
          bandit -r kibana/ -ll -q

      - name: Run unit tests
        run: |
          pytest tests/unit/ --cov=kibana --cov-fail-under=90
