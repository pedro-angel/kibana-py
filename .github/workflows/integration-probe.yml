name: integration-probe

# MEASUREMENT SPIKE -- not a gate, not required, manual trigger only.
# Emits evidence (runner specs, cold bring-up timings, per-test flake rate) so the
# real on-demand integration workflow is tuned from data, not guesses. Deliberately
# self-contained; the shared-harness refactor (readiness gate + plugins reused by
# `make test-integration`) comes when we productionize, not here.
#
# NOTE: workflow_dispatch only becomes runnable once this file is on the default
# branch. It is trigger-inert (no push/PR/schedule), so merging changes nothing
# until someone opens Actions -> integration-probe -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      repeat_count:
        description: "Times to run the selection (per-test flake rate = passes / repeat_count). Keep at 1 for the first run; bump only WITH a narrow test_selector."
        type: number
        required: true
        default: 1
      test_selector:
        description: "pytest -k expression to narrow scope (blank = whole suite). Use a subset for flake measurement."
        type: string
        required: false
        default: ""

permissions: {}            # deny-all at workflow level

concurrency:
  group: integration-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # cold 4-core is slower than the 20min warm/18-core local baseline
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # --- H1: settle the runner-spec uncertainties the research flagged ---
      - name: Runner facts
        run: |
          {
            echo "### Runner facts"
            echo '```'
            echo "nproc: $(nproc)"
            free -h
            df -h /
            docker version --format 'docker {{.Server.Version}}'
            docker compose version
            lsb_release -a 2>/dev/null
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package + probe measurement tooling ([probe] = pytest-timeout / pytest-randomly)
        run: pip install -e ".[dev,all,probe]"

      # --- provision ES + Kibana + APM via the shared script (the release gate uses the same one) ---
      - name: Provision stack (ES + Kibana + APM)
        run: ./scripts/ci-stack-up.sh

      # --- H3: run the selection K times; randomized order; per-test timeout; NO reruns ---
      - name: Run selection x repeat_count
        env:
          KIBANA_URL: http://localhost:5601
          KIBANA_USERNAME: elastic
          KIBANA_PASSWORD: kibana-py-es-dev
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:8200
          ELASTIC_APM_SECRET_TOKEN: kibana-py-dev-apm-token
        run: |
          set -uo pipefail
          reps="${{ inputs.repeat_count }}"
          sel="${{ inputs.test_selector }}"
          mkdir -p probe-junit
          for i in $(seq 1 "$reps"); do
            echo "::group::run $i/$reps"
            pytest tests/integration/ ${sel:+-k "$sel"} \
              -o addopts="" -p no:cacheprovider \
              --timeout=120 --timeout-method=signal \
              --junitxml="probe-junit/run-$i.xml" -q -ra || true   # never abort the measurement
            echo "::endgroup::"
          done

      # --- aggregate; FLAKY vs ALWAYS-FAIL; exits non-zero ONLY if nothing executed ---
      - name: Aggregate flake rate
        run: python3 .github/scripts/flake_rate.py probe-junit "$GITHUB_STEP_SUMMARY"

      - name: Capture stack logs
        if: always()
        working-directory: elastic-start-local
        run: docker compose logs > ../probe-junit/stack.log 2>&1 || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: integration-probe-evidence
          path: probe-junit/**
          if-no-files-found: error
