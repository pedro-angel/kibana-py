name: checks
on:
  push:
    branches: [main]
  pull_request:

permissions: {}  # deny-all at workflow level; grant per-job
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
      - run: pre-commit run check-pin-comments-match --hook-stage manual --all-files
      # Make targets conform to the methodology's shared vocabulary — runs the
      # vendored reference checker (skills/ syncs weekly from agent-methodology).
      - run: skills/dev-environment-facade/vocabulary-conformance.sh
