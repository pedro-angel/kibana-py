name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}  # Deny all at workflow level; grant per-job below

jobs:
  validate-release:
    name: Validate release tag and changelog
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate tagged commit is reachable from main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit $GITHUB_SHA is not reachable from origin/main"
            exit 1
          fi

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep '__versionstr__' kibana/_version.py | cut -d'"' -f2)
          if [ "$TAG" != "v$VERSION" ]; then
            echo "Tag $TAG does not match kibana/_version.py ($VERSION)"
            exit 1
          fi

      - name: Validate changelog entry exists
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          grep -q "## \[$VERSION\]" CHANGELOG.md

  build:
    name: Build distribution
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build]"

      - name: Build package
        run: |
          python -m build

      - name: Validate distribution metadata
        run: |
          python -m twine check dist/*.whl dist/*.tar.gz

      - name: Verify wheel content sanity
        run: |
          python -m zipfile -l dist/kibana_py-*.whl | grep -q "kibana/py.typed"

          if python -m zipfile -l dist/kibana_py-*.whl | grep -E "tests/|docs/|examples/"; then
            echo "Wheel contains disallowed paths (tests/docs/examples)."
            exit 1
          fi

      - name: Generate SBOM
        run: |
          cyclonedx-py environment -o dist/sbom.cdx.json

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish-github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: [build, publish-github-release]
    runs-on: ubuntu-latest
    # environment: release
    permissions:
      contents: read
      id-token: write    # Required for PyPI trusted publishing (OIDC)

    steps:
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Remove non-package files for PyPI
        run: rm -f dist/*.json

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # user: __token__
          # password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
