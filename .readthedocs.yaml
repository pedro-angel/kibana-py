# Read the Docs configuration file for kibana-py
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.14"

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

# HTML only: the architecture/release diagrams are Mermaid, which the pdf/epub (LaTeX)
# builders can only render via the Node-based mermaid-cli (mmdc) — not worth provisioning
# on RTD for auto-generated API docs. Re-add formats here if mmdc is ever set up.

# Python configuration
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
